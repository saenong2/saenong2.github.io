<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정부 유튜브 현황</title>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --bg:#f5f6f8;
      --card:#ffffff;
      --text:#111111;
      --sub:#6b7280;
      --line:#e5e7eb;
      --shadow:0 6px 18px rgba(0,0,0,.06);
      --blue:#2563eb;
      --dark:#111827;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      padding:24px 16px 48px;
      background:var(--bg);
      color:var(--text);
      font-family:"Pretendard", Arial, sans-serif;
    }

    .wrap{
      max-width:1280px;
      margin:0 auto;
    }

    h1{
      margin:0 0 8px;
      font-size:30px;
      font-weight:700;
      letter-spacing:-0.03em;
    }

    .updated{
      margin-bottom:20px;
      font-size:13px;
      color:var(--sub);
    }

    h2{
      margin:32px 0 14px;
      font-size:24px;
      font-weight:700;
      letter-spacing:-0.02em;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
      gap:12px;
      margin-bottom:18px;
    }

    .summary-card{
      background:var(--card);
      border-radius:18px;
      padding:16px 18px;
      box-shadow:var(--shadow);
    }

    .summary-label{
      font-size:13px;
      color:var(--sub);
      margin-bottom:6px;
    }

    .summary-value{
      font-family:"Noto Sans KR", sans-serif;
      font-size:24px;
      font-weight:900;
      letter-spacing:-0.04em;
      line-height:1.2;
    }

    .group-block{
      margin-bottom:18px;
    }

    .group-title{
      margin:0 0 10px;
      font-size:18px;
      font-weight:700;
      letter-spacing:-0.02em;
    }

    .channel-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .channel-card{
      display:flex;
      align-items:center;
      gap:14px;
      padding:16px 18px;
      background:var(--card);
      border-radius:18px;
      box-shadow:var(--shadow);
      text-decoration:none;
      color:inherit;
      transition:transform .15s ease, box-shadow .15s ease;
    }

    .channel-card:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 24px rgba(0,0,0,.08);
    }

    .rank{
      width:34px;
      flex-shrink:0;
      text-align:center;
      font-family:"Noto Sans KR", sans-serif;
      font-size:24px;
      font-weight:800;
      color:#111827;
    }

    .channel-logo{
      width:58px;
      height:58px;
      border-radius:50%;
      object-fit:cover;
      background:#eeeeee;
      border:1px solid var(--line);
      flex-shrink:0;
    }

    .channel-info{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .channel-top{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
    }

    .channel-name{
      font-size:21px;
      font-weight:500;
      line-height:1.3;
      letter-spacing:-0.02em;
      word-break:keep-all;
    }

    .channel-subs{
      flex-shrink:0;
      font-family:"Noto Sans KR", sans-serif;
      font-size:29px;
      font-weight:900;
      line-height:1;
      letter-spacing:-0.04em;
      color:#111111;
    }

    .channel-handle{
      font-size:15px;
      color:var(--sub);
    }

    .mini-more-wrap{
      display:flex;
      justify-content:center;
      margin-top:12px;
    }

    .mini-more-btn{
      appearance:none;
      border:none;
      background:#111827;
      color:#fff;
      padding:10px 16px;
      border-radius:12px;
      font:inherit;
      font-weight:600;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      margin-bottom:16px;
    }

    .toolbar select,
    .toolbar input{
      height:42px;
      padding:0 12px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      font:inherit;
      color:var(--text);
    }

    .toolbar-btn{
      appearance:none;
      border:none;
      background:var(--dark);
      color:#fff;
      padding:0 16px;
      height:42px;
      border-radius:12px;
      font:inherit;
      font-weight:600;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .toolbar-btn:hover{
      opacity:.92;
    }

    .table-wrap{
      background:#fff;
      border-radius:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .table-scroll{
      width:100%;
      overflow-x:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1180px;
    }

    thead th{
      position:sticky;
      top:0;
      background:#fafafa;
      z-index:1;
      font-size:13px;
      color:#4b5563;
      text-align:left;
      padding:16px 14px;
      border-bottom:1px solid var(--line);
      white-space:nowrap;
    }

    tbody td{
      padding:14px;
      border-bottom:1px solid #f1f3f5;
      vertical-align:middle;
      font-size:14px;
    }

    tbody tr:hover{
      background:#fcfcfd;
    }

    .ministry-name{
      min-width:120px;
      font-size:14px;
      font-weight:600;
      line-height:1.4;
      word-break:keep-all;
    }

    .date-cell{
      min-width:95px;
      font-family:"Noto Sans KR", sans-serif;
      line-height:1.35;
      color:#374151;
    }

    .thumb-cell{
      width:180px;
      min-width:180px;
    }

    .video-thumb-small{
      width:160px;
      height:90px;
      object-fit:cover;
      border-radius:10px;
      display:block;
      background:#eeeeee;
      border:1px solid var(--line);
    }

    .title-cell{
      min-width:420px;
    }

    .title-link{
      color:var(--text);
      text-decoration:none;
      font-weight:600;
      line-height:1.5;
      display:block;
      word-break:keep-all;
    }

    .title-link:hover{
      color:var(--blue);
    }

    .num{
      font-family:"Noto Sans KR", sans-serif;
      white-space:nowrap;
      min-width:70px;
    }

    .empty-box,
    .error-box{
      background:#fff;
      border-radius:18px;
      padding:16px 18px;
      box-shadow:var(--shadow);
      font-size:14px;
    }

    .error-box{
      color:#b00020;
      background:#fff4f4;
    }

    .load-more-wrap{
      display:flex;
      justify-content:center;
      margin-top:16px;
    }

    .load-more-btn{
      appearance:none;
      border:none;
      background:#111827;
      color:#fff;
      padding:12px 20px;
      border-radius:12px;
      font:inherit;
      font-weight:600;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .result-count{
      margin:8px 0 14px;
      font-size:13px;
      color:var(--sub);
    }

    @media (max-width:640px){
      body{
        padding:18px 12px 36px;
      }

      h1{
        font-size:26px;
      }

      h2{
        font-size:21px;
      }

      .channel-card{
        padding:14px;
        gap:12px;
      }

      .rank{
        width:28px;
        font-size:20px;
      }

      .channel-logo{
        width:52px;
        height:52px;
      }

      .channel-top{
        flex-direction:column;
        align-items:flex-start;
        gap:4px;
      }

      .channel-name{
        font-size:18px;
      }

      .channel-subs{
        font-size:25px;
      }

      .toolbar{
        flex-direction:column;
        align-items:stretch;
      }

      .toolbar select,
      .toolbar input,
      .toolbar-btn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>정부 유튜브 현황</h1>
    <div id="updated" class="updated">불러오는 중...</div>

    <h2>구독자 비교</h2>
    <div id="summary" class="summary-grid"></div>

    <div class="group-block">
      <h3 class="group-title">장관급 채널 TOP 5</h3>
      <div id="ministerList" class="channel-list"></div>
      <div class="mini-more-wrap">
        <button id="ministerMoreBtn" class="mini-more-btn" type="button" style="display:none;">장관급 더보기</button>
      </div>
    </div>

    <div class="group-block">
      <h3 class="group-title">차관급 채널 TOP 5</h3>
      <div id="viceList" class="channel-list"></div>
      <div class="mini-more-wrap">
        <button id="viceMoreBtn" class="mini-more-btn" type="button" style="display:none;">차관급 더보기</button>
      </div>
    </div>

    <h2>2026년 게시 콘텐츠 모아보기</h2>
    <div class="toolbar">
      <select id="ministryFilter">
        <option value="">전체 기관</option>
      </select>

      <select id="groupFilter">
        <option value="">전체 구분</option>
        <option value="장관급">장관급</option>
        <option value="차관급">차관급</option>
      </select>

      <input type="date" id="startDate" value="2026-01-01" />
      <input type="date" id="endDate" value="2026-12-31" />

      <select id="sortFilter">
        <option value="latest">최신순</option>
        <option value="views">조회수순</option>
        <option value="likes">좋아요순</option>
        <option value="comments">댓글순</option>
      </select>

      <input type="number" id="minViews" placeholder="최소 조회수" min="0" />
      <input type="number" id="minLikes" placeholder="최소 좋아요" min="0" />
      <input type="number" id="minComments" placeholder="최소 댓글" min="0" />

      <button id="downloadExcelBtn" class="toolbar-btn" type="button">엑셀 다운로드</button>
    </div>

    <div id="resultCount" class="result-count"></div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>기관</th>
              <th>구분</th>
              <th>날짜</th>
              <th>썸네일</th>
              <th>제목</th>
              <th>조회수</th>
              <th>좋아요</th>
              <th>댓글</th>
            </tr>
          </thead>
          <tbody id="videoTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="load-more-wrap">
      <button id="loadMoreBtn" class="load-more-btn" type="button" style="display:none;">더보기</button>
    </div>

    <div id="errorBox" style="display:none;"></div>
  </div>

  <script>
    let dashboardData = null;
    let currentFilteredVideos = [];
    let visibleCount = 20;
    const PAGE_SIZE = 20;

    let visibleMinisterCount = 5;
    let visibleViceCount = 5;
    const TOP_PAGE_SIZE = 5;

    function formatSubs(num) {
      const n = Number(num || 0);
      if (n >= 10000) {
        return (n / 10000).toFixed(1).replace(".0", "") + "만명";
      }
      return n.toLocaleString("ko-KR") + "명";
    }

    function formatNum(num) {
      return Number(num || 0).toLocaleString("ko-KR");
    }

    function renderSummary(channels) {
      const summaryEl = document.getElementById("summary");

      if (!channels.length) {
        summaryEl.innerHTML = "";
        return;
      }

      const totalSubs = channels.reduce((sum, item) => sum + Number(item.subscriberCount || 0), 0);
      const avgSubs = Math.round(totalSubs / channels.length);

      const ministers = channels.filter(c => c.group === "장관급");
      const vices = channels.filter(c => c.group === "차관급");

      const topMinister = ministers.length ? ministers[0] : null;
      const topVice = vices.length ? vices[0] : null;

      summaryEl.innerHTML = `
        <div class="summary-card">
          <div class="summary-label">총 구독자</div>
          <div class="summary-value">${formatSubs(totalSubs)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">장관급 채널 1위</div>
          <div class="summary-value" style="font-family:'Pretendard', Arial, sans-serif; font-size:21px; letter-spacing:-0.02em;">
            ${topMinister ? topMinister.name : "-"}
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-label">차관급 채널 1위</div>
          <div class="summary-value" style="font-family:'Pretendard', Arial, sans-serif; font-size:21px; letter-spacing:-0.02em;">
            ${topVice ? topVice.name : "-"}
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-label">평균 구독자</div>
          <div class="summary-value">${formatSubs(avgSubs)}</div>
        </div>
      `;
    }

    function renderChannelCards(list, targetId, visibleCountForGroup) {
      const el = document.getElementById(targetId);

      if (!list.length) {
        el.innerHTML = `<div class="empty-box">표시할 채널이 없습니다.</div>`;
        return;
      }

      const visibleList = list.slice(0, visibleCountForGroup);

      el.innerHTML = visibleList.map((item, index) => `
        <a class="channel-card" href="${item.channelUrl}" target="_blank" rel="noopener noreferrer">
          <div class="rank">${index + 1}</div>
          <img class="channel-logo" src="${item.thumbnail}" alt="${item.name} 로고" />
          <div class="channel-info">
            <div class="channel-top">
              <div class="channel-name">${item.name}</div>
              <div class="channel-subs">${formatSubs(item.subscriberCount)}</div>
            </div>
            <div class="channel-handle">(@${item.handle})</div>
          </div>
        </a>
      `).join("");
    }

    function updateGroupMoreButtons(ministers, vices) {
      const ministerBtn = document.getElementById("ministerMoreBtn");
      const viceBtn = document.getElementById("viceMoreBtn");

      ministerBtn.style.display = ministers.length > visibleMinisterCount ? "inline-block" : "none";
      viceBtn.style.display = vices.length > visibleViceCount ? "inline-block" : "none";
    }

    function renderGroupedChannels(channels) {
      const ministers = channels.filter(c => c.group === "장관급");
      const vices = channels.filter(c => c.group === "차관급");

      renderChannelCards(ministers, "ministerList", visibleMinisterCount);
      renderChannelCards(vices, "viceList", visibleViceCount);
      updateGroupMoreButtons(ministers, vices);
    }

    function fillMinistryFilter(videos) {
      const select = document.getElementById("ministryFilter");
      const ministries = [...new Set(videos.map(v => v.channelName))].sort((a, b) => a.localeCompare(b, "ko"));

      select.innerHTML =
        `<option value="">전체 기관</option>` +
        ministries.map(name => `<option value="${name}">${name}</option>`).join("");
    }

    function getFilteredVideos() {
      const ministry = document.getElementById("ministryFilter").value;
      const group = document.getElementById("groupFilter").value;
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;
      const sortType = document.getElementById("sortFilter").value;

      const minViews = Number(document.getElementById("minViews").value || 0);
      const minLikes = Number(document.getElementById("minLikes").value || 0);
      const minComments = Number(document.getElementById("minComments").value || 0);

      let filtered = dashboardData.videos.filter(v => {
        const dateOnly = v.publishedAt.slice(0, 10);
        const okMinistry = !ministry || v.channelName === ministry;
        const okGroup = !group || v.group === group;
        const okStart = !startDate || dateOnly >= startDate;
        const okEnd = !endDate || dateOnly <= endDate;
        const okViews = Number(v.viewCount || 0) >= minViews;
        const okLikes = Number(v.likeCount || 0) >= minLikes;
        const okComments = Number(v.commentCount || 0) >= minComments;

        return okMinistry && okGroup && okStart && okEnd && okViews && okLikes && okComments;
      });

      if (sortType === "views") {
        filtered.sort((a, b) => Number(b.viewCount || 0) - Number(a.viewCount || 0));
      } else if (sortType === "likes") {
        filtered.sort((a, b) => Number(b.likeCount || 0) - Number(a.likeCount || 0));
      } else if (sortType === "comments") {
        filtered.sort((a, b) => Number(b.commentCount || 0) - Number(a.commentCount || 0));
      } else {
        filtered.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
      }

      return filtered;
    }

    function updateLoadMoreButton() {
      const btn = document.getElementById("loadMoreBtn");

      if (currentFilteredVideos.length > visibleCount) {
        btn.style.display = "inline-block";
        btn.textContent = `더보기 (${Math.min(PAGE_SIZE, currentFilteredVideos.length - visibleCount)}개 더)`;
      } else {
        btn.style.display = "none";
      }
    }

    function renderVideos() {
      const bodyEl = document.getElementById("videoTableBody");
      const resultCountEl = document.getElementById("resultCount");

      currentFilteredVideos = getFilteredVideos();
      const visibleVideos = currentFilteredVideos.slice(0, visibleCount);

      resultCountEl.textContent = `총 ${currentFilteredVideos.length.toLocaleString("ko-KR")}개 중 ${visibleVideos.length.toLocaleString("ko-KR")}개 표시`;

      if (!visibleVideos.length) {
        bodyEl.innerHTML = `
          <tr>
            <td colspan="8">
              <div class="empty-box" style="box-shadow:none; padding:6px 0;">조건에 맞는 영상이 없습니다.</div>
            </td>
          </tr>
        `;
        updateLoadMoreButton();
        return;
      }

      bodyEl.innerHTML = visibleVideos.map(v => `
        <tr>
          <td class="ministry-name">${v.channelName}</td>
          <td>${v.group || ""}</td>
          <td class="date-cell">${v.publishedAt.slice(0, 10)}</td>
          <td class="thumb-cell">
            <a href="${v.videoUrl}" target="_blank" rel="noopener noreferrer">
              <img class="video-thumb-small" src="${v.thumbnail}" alt="${v.title}">
            </a>
          </td>
          <td class="title-cell">
            <a class="title-link" href="${v.videoUrl}" target="_blank" rel="noopener noreferrer">${v.title}</a>
          </td>
          <td class="num">${formatNum(v.viewCount)}</td>
          <td class="num">${formatNum(v.likeCount)}</td>
          <td class="num">${formatNum(v.commentCount)}</td>
        </tr>
      `).join("");

      updateLoadMoreButton();
    }

    function resetAndRenderVideos() {
      visibleCount = PAGE_SIZE;
      renderVideos();
    }

    function loadMoreVideos() {
      visibleCount += PAGE_SIZE;
      renderVideos();
    }

    function loadMoreMinister() {
      visibleMinisterCount += TOP_PAGE_SIZE;
      const sortedChannels = [...dashboardData.channels].sort((a, b) => Number(b.subscriberCount) - Number(a.subscriberCount));
      renderGroupedChannels(sortedChannels);
    }

    function loadMoreVice() {
      visibleViceCount += TOP_PAGE_SIZE;
      const sortedChannels = [...dashboardData.channels].sort((a, b) => Number(b.subscriberCount) - Number(a.subscriberCount));
      renderGroupedChannels(sortedChannels);
    }

    function getSortLabel(sortValue) {
      if (sortValue === "views") return "조회수순";
      if (sortValue === "likes") return "좋아요순";
      if (sortValue === "comments") return "댓글순";
      return "최신순";
    }

    function downloadExcel() {
      if (!currentFilteredVideos.length) {
        alert("다운로드할 데이터가 없습니다.");
        return;
      }

      const startDate = document.getElementById("startDate").value || "시작일없음";
      const endDate = document.getElementById("endDate").value || "종료일없음";
      const ministry = document.getElementById("ministryFilter").value || "전체기관";
      const group = document.getElementById("groupFilter").value || "전체구분";
      const sortLabel = getSortLabel(document.getElementById("sortFilter").value);

      const rows = currentFilteredVideos.map((v, index) => ({
        순번: index + 1,
        구분: v.group || "",
        기관: v.channelName,
        날짜: v.publishedAt.slice(0, 10),
        제목: v.title,
        영상링크: v.videoUrl,
        조회수: Number(v.viewCount || 0),
        좋아요: Number(v.likeCount || 0),
        댓글: Number(v.commentCount || 0)
      }));

      const worksheet = XLSX.utils.json_to_sheet(rows);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "콘텐츠목록");

      const fileName = `정부유튜브_${group}_${ministry}_${startDate}_${endDate}_${sortLabel}.xlsx`;
      XLSX.writeFile(workbook, fileName);
    }

    async function init() {
      try {
        const res = await fetch("data/dashboard-data.json");
        if (!res.ok) {
          throw new Error("data/dashboard-data.json 파일을 불러오지 못했습니다.");
        }

        dashboardData = await res.json();

        document.getElementById("updated").textContent =
          "마지막 업데이트: " +
          (dashboardData.updatedAt ? new Date(dashboardData.updatedAt).toLocaleString("ko-KR") : "-");

        const sortedChannels = [...dashboardData.channels].sort((a, b) => Number(b.subscriberCount) - Number(a.subscriberCount));

        renderSummary(sortedChannels);
        renderGroupedChannels(sortedChannels);
        fillMinistryFilter(dashboardData.videos);
        resetAndRenderVideos();

        document.getElementById("ministryFilter").addEventListener("change", resetAndRenderVideos);
        document.getElementById("groupFilter").addEventListener("change", resetAndRenderVideos);
        document.getElementById("startDate").addEventListener("change", resetAndRenderVideos);
        document.getElementById("endDate").addEventListener("change", resetAndRenderVideos);
        document.getElementById("sortFilter").addEventListener("change", resetAndRenderVideos);
        document.getElementById("minViews").addEventListener("input", resetAndRenderVideos);
        document.getElementById("minLikes").addEventListener("input", resetAndRenderVideos);
        document.getElementById("minComments").addEventListener("input", resetAndRenderVideos);
        document.getElementById("loadMoreBtn").addEventListener("click", loadMoreVideos);
        document.getElementById("downloadExcelBtn").addEventListener("click", downloadExcel);
        document.getElementById("ministerMoreBtn").addEventListener("click", loadMoreMinister);
        document.getElementById("viceMoreBtn").addEventListener("click", loadMoreVice);

      } catch (err) {
        const errorBox = document.getElementById("errorBox");
        errorBox.style.display = "block";
        errorBox.className = "error-box";
        errorBox.textContent = err.message;
      }
    }

    init();
  </script>
</body>
</html>
