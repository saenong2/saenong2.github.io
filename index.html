<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정부 유튜브 현황</title>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f5f6f8;
      --card:#ffffff;
      --text:#111111;
      --sub:#6b7280;
      --line:#e5e7eb;
      --shadow:0 6px 18px rgba(0,0,0,.06);
      --blue:#2563eb;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:24px 16px 48px;
      background:var(--bg);
      color:var(--text);
      font-family:"Pretendard", Arial, sans-serif;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
    }

    h1{
      margin:0 0 8px;
      font-size:30px;
      font-weight:700;
      letter-spacing:-0.03em;
    }

    .updated{
      margin-bottom:20px;
      font-size:13px;
      color:var(--sub);
    }

    h2{
      margin:32px 0 14px;
      font-size:24px;
      font-weight:700;
      letter-spacing:-0.02em;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:12px;
      margin-bottom:18px;
    }

    .summary-card{
      background:var(--card);
      border-radius:18px;
      padding:16px 18px;
      box-shadow:var(--shadow);
    }

    .summary-label{
      font-size:13px;
      color:var(--sub);
      margin-bottom:6px;
    }

    .summary-value{
      font-family:"Noto Sans KR", sans-serif;
      font-size:28px;
      font-weight:900;
      letter-spacing:-0.04em;
      line-height:1.1;
    }

    .channel-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .channel-card{
      display:flex;
      align-items:center;
      gap:14px;
      padding:16px 18px;
      background:var(--card);
      border-radius:18px;
      box-shadow:var(--shadow);
      text-decoration:none;
      color:inherit;
      transition:transform .15s ease, box-shadow .15s ease;
    }

    .channel-card:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 24px rgba(0,0,0,.08);
    }

    .rank{
      width:34px;
      flex-shrink:0;
      text-align:center;
      font-family:"Noto Sans KR", sans-serif;
      font-size:24px;
      font-weight:800;
      color:#111827;
    }

    .channel-logo{
      width:58px;
      height:58px;
      border-radius:50%;
      object-fit:cover;
      background:#eeeeee;
      border:1px solid var(--line);
      flex-shrink:0;
    }

    .channel-info{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .channel-top{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
    }

    .channel-name{
      font-size:21px;
      font-weight:500;
      line-height:1.3;
      letter-spacing:-0.02em;
      word-break:keep-all;
    }

    .channel-subs{
      flex-shrink:0;
      font-family:"Noto Sans KR", sans-serif;
      font-size:29px;
      font-weight:900;
      line-height:1;
      letter-spacing:-0.04em;
      color:#111111;
    }

    .channel-handle{
      font-size:15px;
      color:var(--sub);
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      margin-bottom:16px;
    }

    .toolbar select,
    .toolbar input{
      height:42px;
      padding:0 12px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      font:inherit;
      color:var(--text);
    }

    .video-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
      gap:14px;
    }

    .video-card{
      background:var(--card);
      border-radius:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .video-thumb-link{
      display:block;
    }

    .video-thumb{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      display:block;
      background:#eeeeee;
    }

    .video-body{
      padding:14px;
    }

    .video-title{
      display:block;
      text-decoration:none;
      color:var(--text);
      font-size:16px;
      font-weight:600;
      line-height:1.45;
      margin-bottom:8px;
    }

    .video-title:hover{
      color:var(--blue);
    }

    .video-meta{
      font-size:13px;
      color:var(--sub);
      margin-bottom:8px;
    }

    .video-stats{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      font-size:13px;
      color:#374151;
      font-family:"Noto Sans KR", sans-serif;
    }

    .empty-box,
    .error-box{
      background:#fff;
      border-radius:18px;
      padding:16px 18px;
      box-shadow:var(--shadow);
      font-size:14px;
    }

    .error-box{
      color:#b00020;
      background:#fff4f4;
    }

    @media (max-width:640px){
      body{
        padding:18px 12px 36px;
      }

      h1{
        font-size:26px;
      }

      h2{
        font-size:21px;
      }

      .channel-card{
        padding:14px;
        gap:12px;
      }

      .rank{
        width:28px;
        font-size:20px;
      }

      .channel-logo{
        width:52px;
        height:52px;
      }

      .channel-top{
        flex-direction:column;
        align-items:flex-start;
        gap:4px;
      }

      .channel-name{
        font-size:18px;
      }

      .channel-subs{
        font-size:25px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>정부 유튜브 현황</h1>
    <div id="updated" class="updated">불러오는 중...</div>

    <h2>구독자 비교</h2>
    <div id="summary" class="summary-grid"></div>
    <div id="channelList" class="channel-list"></div>

    <h2>2026년 게시 콘텐츠 모아보기</h2>
  <div class="toolbar">
  <select id="ministryFilter">
    <option value="">전체 부처</option>
  </select>

  <input type="date" id="startDate" value="2026-01-01" />
  <input type="date" id="endDate" value="2026-12-31" />

  <select id="sortFilter">
    <option value="latest">최신순</option>
    <option value="views">조회수순</option>
    <option value="likes">좋아요순</option>
    <option value="comments">댓글순</option>
  </select>

  <input type="number" id="minViews" placeholder="최소 조회수" min="0" />
  <input type="number" id="minLikes" placeholder="최소 좋아요" min="0" />
  <input type="number" id="minComments" placeholder="최소 댓글" min="0" />
</div>
    <div id="videoGrid" class="video-grid"></div>

    <div id="errorBox" style="display:none;"></div>
  </div>

  <script>
    let dashboardData = null;

    function formatSubs(num) {
      const n = Number(num || 0);
      if (n >= 10000) {
        return (n / 10000).toFixed(1).replace(".0", "") + "만명";
      }
      return n.toLocaleString("ko-KR") + "명";
    }

    function formatNum(num) {
      return Number(num || 0).toLocaleString("ko-KR");
    }

    function renderSummary(channels) {
      const summaryEl = document.getElementById("summary");

      if (!channels.length) {
        summaryEl.innerHTML = "";
        return;
      }

      const totalSubs = channels.reduce((sum, item) => sum + Number(item.subscriberCount || 0), 0);
      const avgSubs = Math.round(totalSubs / channels.length);
      const topChannel = channels[0];

      summaryEl.innerHTML = `
        <div class="summary-card">
          <div class="summary-label">총 구독자</div>
          <div class="summary-value">${formatSubs(totalSubs)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">대상 채널</div>
          <div class="summary-value">${channels.length}개</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">1위 채널</div>
          <div class="summary-value" style="font-family:'Pretendard', Arial, sans-serif; font-size:22px; letter-spacing:-0.02em;">${topChannel.name}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">평균 구독자</div>
          <div class="summary-value">${formatSubs(avgSubs)}</div>
        </div>
      `;
    }

    function renderChannels(channels) {
      const listEl = document.getElementById("channelList");

      if (!channels.length) {
        listEl.innerHTML = `<div class="empty-box">표시할 채널 데이터가 없습니다.</div>`;
        return;
      }

      listEl.innerHTML = channels.map((item, index) => `
        <a class="channel-card" href="${item.channelUrl}" target="_blank" rel="noopener noreferrer">
          <div class="rank">${index + 1}</div>
          <img class="channel-logo" src="${item.thumbnail}" alt="${item.name} 로고" />
          <div class="channel-info">
            <div class="channel-top">
              <div class="channel-name">${item.name}</div>
              <div class="channel-subs">${formatSubs(item.subscriberCount)}</div>
            </div>
            <div class="channel-handle">(@${item.handle})</div>
          </div>
        </a>
      `).join("");
    }

    function fillMinistryFilter(videos) {
      const select = document.getElementById("ministryFilter");
      const ministries = [...new Set(videos.map(v => v.channelName))].sort((a, b) => a.localeCompare(b, "ko"));

      select.innerHTML =
        `<option value="">전체 부처</option>` +
        ministries.map(name => `<option value="${name}">${name}</option>`).join("");
    }

    function renderVideos() {
      const gridEl = document.getElementById("videoGrid");
      const ministry = document.getElementById("ministryFilter").value;
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;

      const filtered = dashboardData.videos.filter(v => {
        const dateOnly = v.publishedAt.slice(0, 10);
        const okMinistry = !ministry || v.channelName === ministry;
        const okStart = !startDate || dateOnly >= startDate;
        const okEnd = !endDate || dateOnly <= endDate;
        return okMinistry && okStart && okEnd;
      });

      if (!filtered.length) {
        gridEl.innerHTML = `<div class="empty-box">조건에 맞는 영상이 없습니다.</div>`;
        return;
      }

      gridEl.innerHTML = filtered.map(v => `
        <div class="video-card">
          <a class="video-thumb-link" href="${v.videoUrl}" target="_blank" rel="noopener noreferrer">
            <img class="video-thumb" src="${v.thumbnail}" alt="${v.title}">
          </a>
          <div class="video-body">
            <a class="video-title" href="${v.videoUrl}" target="_blank" rel="noopener noreferrer">${v.title}</a>
            <div class="video-meta">${v.channelName} · ${v.publishedAt.slice(0, 10)}</div>
            <div class="video-stats">
              <span>조회수 ${formatNum(v.viewCount)}</span>
              <span>좋아요 ${formatNum(v.likeCount)}</span>
              <span>댓글 ${formatNum(v.commentCount)}</span>
            </div>
          </div>
        </div>
      `).join("");
    }

    async function init() {
      try {
        const res = await fetch("data/dashboard-data.json");
        if (!res.ok) {
          throw new Error("data/dashboard-data.json 파일을 불러오지 못했습니다.");
        }

        dashboardData = await res.json();

        document.getElementById("updated").textContent =
          "마지막 업데이트: " +
          (dashboardData.updatedAt ? new Date(dashboardData.updatedAt).toLocaleString("ko-KR") : "-");

        const sortedChannels = [...dashboardData.channels].sort((a, b) => Number(b.subscriberCount) - Number(a.subscriberCount));

        renderSummary(sortedChannels);
        renderChannels(sortedChannels);
        fillMinistryFilter(dashboardData.videos);
        renderVideos();

        document.getElementById("ministryFilter").addEventListener("change", renderVideos);
        document.getElementById("startDate").addEventListener("change", renderVideos);
        document.getElementById("endDate").addEventListener("change", renderVideos);
      } catch (err) {
        const errorBox = document.getElementById("errorBox");
        errorBox.style.display = "block";
        errorBox.className = "error-box";
        errorBox.textContent = err.message;
      }
    }

    init();
  </script>
</body>
</html>
