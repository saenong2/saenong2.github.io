<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정부 유튜브 구독자 비교</title>

  <!-- Pretendard -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

  <!-- Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f6f8;
      --card-bg: #ffffff;
      --text: #111111;
      --subtext: #6b7280;
      --line: #e5e7eb;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px 40px;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", Arial, sans-serif;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    #status {
      margin: 0 0 8px;
      padding: 10px 12px;
      background: #f0f2f5;
      border-radius: 10px;
      font-size: 14px;
      color: #374151;
    }

    #updated {
      margin: 0 0 14px;
      font-size: 13px;
      color: var(--subtext);
    }

    #error {
      margin: 0 0 14px;
      padding: 10px 12px;
      background: #ffeaea;
      color: #b00020;
      border-radius: 10px;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .channel-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .channel-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--card-bg);
      border-radius: 18px;
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .channel-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    .rank {
      width: 34px;
      flex-shrink: 0;
      text-align: center;
      font-family: "Noto Sans KR", sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.03em;
    }

    .channel-logo {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      object-fit: cover;
      background: #eeeeee;
      flex-shrink: 0;
      border: 1px solid var(--line);
    }

    .channel-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .channel-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .channel-name {
      font-size: 21px;
      font-weight: 500;
      line-height: 1.3;
      letter-spacing: -0.02em;
      word-break: keep-all;
    }

    .channel-subs {
      flex-shrink: 0;
      font-family: "Noto Sans KR", sans-serif;
      font-size: 29px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      color: #111111;
    }

    .channel-handle {
      font-size: 15px;
      font-weight: 400;
      color: var(--subtext);
      letter-spacing: -0.01em;
    }

    @media (max-width: 640px) {
      body {
        padding: 18px 12px 32px;
      }

      h2 {
        font-size: 24px;
      }

      .channel-card {
        padding: 14px 14px;
        gap: 12px;
      }

      .rank {
        width: 28px;
        font-size: 20px;
      }

      .channel-logo {
        width: 52px;
        height: 52px;
      }

      .channel-top {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      .channel-name {
        font-size: 18px;
      }

      .channel-subs {
        font-size: 25px;
      }

      .channel-handle {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <h2>정부 유튜브 구독자 비교</h2>
    <div id="status">불러오는 중...</div>
    <div id="updated"></div>
    <div id="error"></div>
    <div id="result" class="channel-list"></div>
  </div>

  <script>
    const API_KEY = "AIzaSyBuHQuWnLHeOsIqq56avZQLhjsudm94w54";

    const channels = [
      { name: "농림축산식품부", handle: "mafrakorea", id: "UC014CTCdGJzeQfJtxnnMyjQ" },
      { name: "국토교통부", handle: "korealand", id: "UC0G0Z05LATPtpUkxeOrEjOA" },
      { name: "문화체육관광부", handle: "문화체육관광부", id: "UCXXA3M3rNQ1NTJZyUJOekPw" },
      { name: "보건복지부", handle: "mohwpr", id: "UCRsetXyMdNsR4M9KvA-a_fg" },
      { name: "국방부", handle: "ROK_MND", id: "UCoreZRRtVpu521wZNJWfUqQ" },
      { name: "고용노동부", handle: "moelkorea", id: "UC_fFLoUU8NzaZ0G7jlE1DQA" },
      { name: "기후부", handle: "mevpr", id: "UCcyXjAdiepuKgmJO2C2fEmA" },
      { name: "법무부", handle: "moj_korea", id: "UCv98wlLoiNXta0k34cy0zvA" },
      { name: "통일부", handle: "UNITVKOREA", id: "UCkxOASipmR5wPoLbGUP4QPA" },
      { name: "행정안전부", handle: "withyou3542", id: "UCzteSXznVjwESizsCcSKSWw" },
      { name: "외교부", handle: "MOFAKorea", id: "UCwRFj9gC3meixU8fqKJdgxA" },
      { name: "국가보훈부", handle: "mpvakorea", id: "UClvT0GWxHHznabonSbWf7cg" },
      { name: "교육부", handle: "ourmoetv", id: "UCexUyFaq9YH7XJfCQzVR_jg" },
      { name: "중소기업벤처부", handle: "bizinfo1357", id: "UCaiBniKLomFVHcb5zt3lnfQ" },
      { name: "해양수산부", handle: "해양수산부", id: "UCgISSs3Odu2Wj_bhH-GHvnw" },
      { name: "산업통상자원부", handle: "motiekorea", id: "UCoNGys8NV8iInPK-AyTSgTA" },
      { name: "과학기술정보통신부", handle: "withmsip", id: "UCjeajitvt5U76154ynrVzAA" },
      { name: "재정경제부", handle: "mosfkorea", id: "UCnrPF6de3KuHZy3c2ZkqcMA" },
      { name: "성평등가족부", handle: "mogefkorea", id: "UCcgeHR34Rr17yaoaqD0jR2A" }
    ];

    function formatSubscribers(num) {
      const n = Number(num);
      if (n >= 10000) {
        return (n / 10000).toFixed(1).replace(".0", "") + "만명";
      }
      return n.toLocaleString() + "명";
    }

    async function getChannelData(channel) {
      const url = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channel.id}&key=${API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();

      if (!res.ok) {
        throw new Error("API 요청 실패\n" + JSON.stringify(data, null, 2));
      }

      if (!data.items || data.items.length === 0) {
        throw new Error(`채널 정보를 찾지 못했습니다: ${channel.name}`);
      }

      const item = data.items[0];

      return {
        name: channel.name,
        handle: channel.handle,
        url: `https://www.youtube.com/@${channel.handle}`,
        thumbnail: item.snippet.thumbnails.default.url,
        subscriberCount: Number(item.statistics.subscriberCount)
      };
    }

    async function loadChannels() {
      const statusEl = document.getElementById("status");
      const errorEl = document.getElementById("error");
      const resultEl = document.getElementById("result");

      errorEl.textContent = "";
      statusEl.textContent = "불러오는 중...";

      try {
        const results = [];

        for (const channel of channels) {
          const info = await getChannelData(channel);
          results.push(info);
        }

        results.sort((a, b) => b.subscriberCount - a.subscriberCount);

        statusEl.textContent = `불러오기 완료 (${results.length}개 채널)`;
        document.getElementById("updated").textContent =
          "마지막 업데이트: " + new Date().toLocaleTimeString("ko-KR");

        resultEl.innerHTML = results.map((item, index) => `
          <a class="channel-card" href="${item.url}" target="_blank" rel="noopener noreferrer">
            <div class="rank">${index + 1}</div>
            <img class="channel-logo" src="${item.thumbnail}" alt="${item.name} 로고" />
            <div class="channel-info">
              <div class="channel-top">
                <div class="channel-name">${item.name}</div>
                <div class="channel-subs">${formatSubscribers(item.subscriberCount)}</div>
              </div>
              <div class="channel-handle">(@${item.handle})</div>
            </div>
          </a>
        `).join("");

      } catch (err) {
        statusEl.textContent = "불러오기 실패";
        errorEl.textContent = err.message;
        console.error(err);
      }
    }

    loadChannels();
    setInterval(loadChannels, 300000);
  </script>

</body>
</html>
