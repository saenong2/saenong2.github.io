name: Update Instagram Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
      timezone: 'Asia/Seoul'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Instagram data
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python scripts/fetch_instagram.py

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/accounts.json data/posts.json data/last_updated.json
          git diff --cached --quiet || git commit -m "chore: update instagram data"
          git push
